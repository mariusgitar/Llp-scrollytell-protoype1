<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Likevel kommer få</title>
  <desc id="desc">Samme kursrom som i forrige steg, men med få deltakere og flere tomme plasser.</desc>
